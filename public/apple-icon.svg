<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" fill="none">
  <!-- Blue background (Apple requires 180x180) -->
  <rect width="180" height="180" rx="38" fill="#2563eb"/>
  <!-- Thermometer stem -->
  <rect x="76" y="24" width="28" height="92" rx="14" fill="white"/>
  <!-- Thermometer bulb -->
  <circle cx="90" cy="133" r="30" fill="white"/>
  <!-- Mercury column -->
  <rect x="83" y="55" width="14" height="60" rx="7" fill="#93c5fd"/>
  <!-- Mercury bulb fill -->
  <circle cx="90" cy="133" r="20" fill="#60a5fa"/>
  <!-- Tick marks -->
  <rect x="104" y="60" width="12" height="5" rx="2.5" fill="white" opacity="0.6"/>
  <rect x="104" y="75" width="12" height="5" rx="2.5" fill="white" opacity="0.6"/>
  <rect x="104" y="90" width="12" height="5" rx="2.5" fill="white" opacity="0.6"/>
</svg>
